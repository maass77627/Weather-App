<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Weather App</title>
</head>
<body>

    <div class="clouds"></div>

    <h1>Weather App</h1>

    <div class="info">
        <h2 id="location" class="location"></h2>
        <h1 id="temp" class="temp"></h1>
        <span id="weather" class="weather"></span>
        <span id="highlow" class="highlow"></span>
    </div>

    <div class="current">
        <p class="details">weather details</p>
        <div id="weather-container" class="weather-container">
            <div class="card">
                <span id="time" class="time"></span>
                <img id="icon" class="icon"></img>
                <span id="temperature" class="temperature"></span>
           </div>
       </div>
    </div>

    <div class="forecast">
        <p>10-DAY FORECAST</p>
        <div id="days" class="days">
            <h1 class="day"></h1>
            <img class="icon"></img>


          <div id="temp-bar" class="temp-bar">
          <div id="temp-range" class="temp-range"></div>
         </div>

        </div>
        
           
    </div>







    <script src="js/index.js"></script>
</body>
</html>
